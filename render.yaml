services:
  # 1. Backend (API) - Web Service (Python)
  - type: web
    name: skillogic-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "reflex run --env prod --backend-only"
    envVars:
      - key: PORT
        value: "8000"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  # 2. Frontend - Static Site
  - type: web
    name: skillogic-web
    env: static
    buildCommand: "./build.sh"
    staticPublishPath: ".web/_static"
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: skillogic-api
          envVarKey: RENDER_EXTERNAL_URL
